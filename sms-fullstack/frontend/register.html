<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scholar — Register</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">

      <h2 class="login-heading">Create Account</h2>
      <p class="login-sub">Join Scholar platform</p>

      <div class="form-group">
        <label>Name</label>
        <input id="name" class="form-input" placeholder="Your name"/>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input id="email" class="form-input" placeholder="Email"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" class="form-input" placeholder="Password"/>
      </div>

      <button class="btn-login" onclick="handleRegister()">Register</button>

      <p id="msg" style="margin-top:10px;"></p>

      <p style="margin-top:15px; font-size:0.9rem;">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    async function handleRegister() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const msg = document.getElementById("msg");

      if (!name || !email || !password) {
        msg.innerText = "All fields are required.";
        return;
      }

      try {
        await apiRegister(name, email, password);

        msg.innerText = "✅ Registered! Redirecting to login...";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1200);

      } catch (err) {
        msg.innerText = err.message;
      }
    }
  </script>

</body>
</html>
