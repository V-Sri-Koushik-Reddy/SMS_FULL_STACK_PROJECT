<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scholar — Auth</title>

  <!-- Fonts (same as before) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Background -->
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrap">
  <div class="login-card">

    <!-- BRAND -->
    <div class="login-brand">
      <div class="login-brand-icon">✦</div>
      <div class="login-brand-text">
        <h1>Scholar</h1>
        <p>Student Management System</p>
      </div>
    </div>

    <!-- HEADING -->
    <h2 class="login-heading" id="title">Welcome back</h2>
    <p class="login-sub" id="subtitle">Sign in to access your dashboard</p>

    <!-- DEFAULT ADMIN (only login) -->
    <div class="creds-hint" id="admin-hint">
      <span>💡</span>
      <span>
        <strong>Default admin:</strong><br />
        admin@example.com / admin123
      </span>
    </div>

    <!-- NAME (only register) -->
    <div class="form-group" id="name-group" style="display:none;">
      <label class="form-label">Name</label>
      <input id="name" class="form-input" placeholder="Your name"/>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="email" class="form-input" placeholder="Email"/>
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" type="password" class="form-input" placeholder="Password"/>
    </div>

    <!-- BUTTON -->
    <button class="btn-login" id="submit-btn">Sign in to Scholar</button>

    <!-- ERROR -->
    <div class="login-error" id="msg"></div>

    <!-- TOGGLE -->
    <p style="margin-top:14px; text-align:center; font-size:0.85rem;">
      <span id="toggle-text">Don't have an account?</span>
      <a href="#" id="toggle-link">Register</a>
    </p>

  </div>
</div>

<script src="auth.js"></script>
<script>
  let isLogin = true;

  const nameGroup = document.getElementById("name-group");
  const title = document.getElementById("title");
  const subtitle = document.getElementById("subtitle");
  const btn = document.getElementById("submit-btn");
  const toggleText = document.getElementById("toggle-text");
  const toggleLink = document.getElementById("toggle-link");
  const msg = document.getElementById("msg");
  const adminHint = document.getElementById("admin-hint");

  const nameInput = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const passInput = document.getElementById("password");

  function showError(m) {
    msg.textContent = m;
    msg.classList.add("show");
  }

  function clearError() {
    msg.classList.remove("show");
  }

  // TOGGLE
  toggleLink.addEventListener("click", (e) => {
    e.preventDefault();
    isLogin = !isLogin;
    clearError();

    if (isLogin) {
      nameGroup.style.display = "none";
      adminHint.style.display = "flex";
      title.innerText = "Welcome back";
      subtitle.innerText = "Sign in to access your dashboard";
      btn.innerText = "Sign in to Scholar";
      toggleText.innerText = "Don't have an account?";
      toggleLink.innerText = "Register";
    } else {
      nameGroup.style.display = "block";
      adminHint.style.display = "none";
      title.innerText = "Create account";
      subtitle.innerText = "Join Scholar platform";
      btn.innerText = "Create Account";
      toggleText.innerText = "Already have an account?";
      toggleLink.innerText = "Login";
    }
  });

  // SUBMIT
  btn.addEventListener("click", async () => {
    clearError();

    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passInput.value;

    if (!email) return showError("Email required");
    if (!password) return showError("Password required");

    try {
      if (isLogin) {
        await apiLogin(email, password);
        window.location.href = "index.html";
      } else {
        if (!name) return showError("Name required");

        await apiRegister(name, email, password);
        showError("✅ Registered! Now login");

        toggleLink.click(); // switch to login
      }
    } catch (err) {
      showError(err.message);
    }
  });
</script>

</body>
</html>
