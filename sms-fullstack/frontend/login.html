<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scholar — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Atmospheric background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <div class="login-wrap">
    <div class="login-card" role="main">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-brand-icon" aria-hidden="true">✦</div>
        <div class="login-brand-text">
          <h1>Scholar</h1>
          <p>Student Management System</p>
        </div>
      </div>

      <!-- Heading -->
      <h2 class="login-heading">Welcome back</h2>
      <p class="login-sub">Sign in to access your dashboard</p>

      <!-- Default credentials hint -->
      <div class="creds-hint" role="note" aria-label="Default credentials">
        <span class="creds-hint-icon">💡</span>
        <span>
          <strong>Default admin:</strong><br />
          admin@example.com &nbsp;/&nbsp; admin123
        </span>
      </div>

      <!-- Form -->
      <div class="form-group">
        <label class="form-label" for="inp-email">Email address</label>
        <input
          id="inp-email"
          class="form-input"
          type="email"
          placeholder="admin@example.com"
          autocomplete="email"
          value="admin@example.com"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="inp-password">Password</label>
        <div class="pw-wrap">
          <input
            id="inp-password"
            class="form-input"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            value="admin123"
          />
          <button class="pw-toggle" id="pw-toggle" type="button" aria-label="Toggle password visibility">
            👁
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-login" id="btn-login" type="button">
        <span class="login-spinner" id="spinner"></span>
        <span id="btn-login-label">Sign in to Scholar</span>
      </button>

      <!-- Error message -->
      <div class="login-error" id="login-error" role="alert"></div>

    </div>
  </div>

  <!-- Load auth helpers, then login logic -->
  <script src="auth.js"></script>
  <script>
    // ── Redirect to dashboard if already logged in ────────
    redirectIfLoggedIn();

    // ── DOM references ────────────────────────────────────
    const inpEmail  = document.getElementById("inp-email");
    const inpPw     = document.getElementById("inp-password");
    const btnLogin  = document.getElementById("btn-login");
    const btnLabel  = document.getElementById("btn-login-label");
    const spinner   = document.getElementById("spinner");
    const errBox    = document.getElementById("login-error");
    const pwToggle  = document.getElementById("pw-toggle");

    // ── Password visibility toggle ────────────────────────
    pwToggle.addEventListener("click", () => {
      const isText = inpPw.type === "text";
      inpPw.type = isText ? "password" : "text";
      pwToggle.textContent = isText ? "👁" : "🙈";
    });

    // ── Show / hide error message ─────────────────────────
    function showError(msg) {
      errBox.textContent = msg;
      errBox.classList.add("show");
      // Reset animation so it re-shakes on repeated errors
      errBox.style.animation = "none";
      errBox.offsetHeight;   // reflow
      errBox.style.animation = "";
    }
    function clearError() {
      errBox.classList.remove("show");
    }

    // ── Set loading state ─────────────────────────────────
    function setLoading(loading) {
      btnLogin.disabled         = loading;
      spinner.style.display     = loading ? "block" : "none";
      btnLabel.textContent      = loading ? "Signing in…" : "Sign in to Scholar";
    }

    // ── Login handler ─────────────────────────────────────
    async function handleLogin() {
      clearError();

      const email    = inpEmail.value.trim();
      const password = inpPw.value;

      // Client-side quick checks
      if (!email) { showError("Please enter your email address."); inpEmail.focus(); return; }
      if (!password) { showError("Please enter your password."); inpPw.focus(); return; }

      setLoading(true);

      try {
        await apiLogin(email, password);
        // On success — redirect to dashboard
        window.location.href = "index.html";

      } catch (err) {
        showError(err.message || "Something went wrong. Please try again.");
      } finally {
        setLoading(false);
      }
    }

    // ── Button click + Enter key support ──────────────────
    btnLogin.addEventListener("click", handleLogin);
    [inpEmail, inpPw].forEach((el) =>
      el.addEventListener("keydown", (e) => { if (e.key === "Enter") handleLogin(); })
    );

    <p style="margin-top:10px; font-size: 0.85rem;">
        Don’t have an account?
        <a href="register.html">Register</a>
      </p>

      
  </script>
</body>
</html>
